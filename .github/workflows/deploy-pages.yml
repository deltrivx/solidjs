name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run build
      - run: cp index.html docs/index.html
      - run: cp -r assets docs/ || true
      - run: echo "www.deltrivx.com" > docs/CNAME
      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git worktree add /tmp/gh-pages gh-pages || git checkout --orphan gh-pages
          rsync -a --delete docs/ /tmp/gh-pages/
          cd /tmp/gh-pages
          git add -A
          git commit -m "deploy: update pages" || echo "No changes to commit"
          git push origin gh-pages
