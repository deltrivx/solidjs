name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build blog
        run: |
          npm install
          npm run build

      - name: Build monitor
        run: |
          cd monitor
          npm install
          npm run build

      - name: Copy monitor dist to blog dist
        run: |
          mkdir -p dist/monitor
          cp -r monitor/dist/* dist/monitor/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_dir: ./dist
